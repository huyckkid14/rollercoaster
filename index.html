<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golden Bridge 3D Traffic</title>
    <link rel="stylesheet" href="./styles.css?v=3" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="scene"></canvas>

    <header class="hud topbar">
      <div>
        <h1>Golden Bridge</h1>
        <p>San Francisco 3D traffic model</p>
      </div>
      <div class="status" id="status">Normal POV</div>
    </header>

    <aside class="hud panel" aria-label="Scene controls">
      <section>
        <h2>POV</h2>
        <div class="control-grid two" id="povControls">
          <button class="active" data-pov="normal">Normal</button>
          <button data-pov="driver">Driver</button>
        </div>
      </section>

      <section>
        <h2>Settings</h2>
        <div class="control-grid" id="settingControls">
          <button class="active" data-setting="summer">Summer</button>
          <button data-setting="winter">Winter</button>
          <button data-setting="fall">Fall</button>
          <button data-setting="night">Night</button>
        </div>
      </section>
    </aside>

    <div class="hint" id="hint">Drag to move. Scroll to zoom.</div>
    <div class="fps-overlay" id="fpsOverlay">FPS 0</div>

    <div class="driver-cockpit" id="driverCockpit" aria-hidden="true">
      <div class="windshield"></div>
      <div class="dash">
        <div class="gauge"></div>
        <div class="wheel">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="gauge right"></div>
      </div>
    </div>

    <script type="module" src="./src/main.js?v=3"></script>
  </body>
</html>
